<div class="app-shell">
  <!-- Animated background bubbles -->
  <div class="bg-bubbles" aria-hidden="true">
    <div class="bubble bubble-1"></div>
    <div class="bubble bubble-2"></div>
    <div class="bubble bubble-3"></div>
    <div class="bubble bubble-4"></div>
    <div class="bubble bubble-5"></div>
  </div>

  <header>
    <div class="logo-group">
      <div class="logo-icon">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="20" fill="url(#logoGrad)"/>
          <path d="M20 10L20 26M20 26L14 20M20 26L26 20" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="12" y1="30" x2="28" y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40">
              <stop stop-color="#7c3aed"/>
              <stop offset="1" stop-color="#ec4899"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1>AnyDownload</h1>
    </div>
    <p class="tagline">Grab videos from your favorite social platforms</p>

    <div class="platform-bubbles">
      <span class="p-bubble yt">YouTube</span>
      <span class="p-bubble ig">Instagram</span>
      <span class="p-bubble tw">X / Twitter</span>
      <span class="p-bubble li">LinkedIn</span>
      <span class="p-bubble tt">TikTok</span>
      <span class="p-bubble fb">Facebook</span>
    </div>
  </header>

  <main>
    <app-url-input />
    <app-download-list />
  </main>

  <footer>
    <div class="footer-bubble">
      Paste a link &bull; Pick quality &bull; Download &bull; Done
    </div>
  </footer>
</div>
